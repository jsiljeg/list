<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#161513">
<title>Theatrium by Filho — Wine &amp; Drinks List</title>
<meta name="description" content="Theatrium by Filho — digital wine and drinks list. Teslina 7, Zagreb.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@400;500;600&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="assets/theatrium-logo.svg" type="image/svg+xml">
</head>
<body>

<!-- Language start screen -->
<div id="start" class="start hidden">
  <img class="start-logo" src="assets/theatrium-logo.svg" alt="Theatrium by Filho">
  <p id="start-title" class="start-title">Odaberite jezik · Choose your language</p>
  <div id="lang-buttons" class="lang-buttons"></div>
</div>

<!-- Main app -->
<div id="app" class="app hidden">
  <header class="header">
    <img class="header-logo" src="assets/theatrium-logo.svg" alt="Theatrium by Filho" id="home-logo">
    <p class="header-subtitle" id="subtitle"></p>
    <div class="header-tools">
      <input id="search" class="search" type="search" autocomplete="off">
      <div id="lang-switch" class="lang-switch"></div>
    </div>
    <nav id="nav" class="nav"></nav>
  </header>
  <main id="content" class="content"></main>
  <footer class="footer">
    <p id="legal"></p>
    <p id="company"></p>
  </footer>
</div>

<!-- Wine detail modal -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-sheet">
    <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
</body>
</html>
